name: Build check

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# No deploys from CI. cPanel pulls source branches directly and runs
# the build server-side via .cpanel.yml. This workflow only verifies
# that the source builds cleanly, catching errors before they hit
# the cPanel deploy.
jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        env:
          # Local-build SITE_URL doesn't really matter for the check;
          # use production so canonical URLs at least look right.
          SITE_URL: https://tutelare.ai
          LAUNCHED: false
        run: npm run build
