name: Build and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && 'ppe' || 'prod' }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PPE is NEVER indexable, regardless of launch state.
            echo "site_url=https://ppe.tutelare.ai" >> "$GITHUB_OUTPUT"
            echo "launched=false" >> "$GITHUB_OUTPUT"
            echo "label=PPE" >> "$GITHUB_OUTPUT"
            echo "deploy_path=${{ vars.CPANEL_DEPLOY_PATH_PPE }}" >> "$GITHUB_OUTPUT"
          else
            # Production. Flip `launched` to "true" at soft launch.
            echo "site_url=https://tutelare.ai" >> "$GITHUB_OUTPUT"
            echo "launched=false" >> "$GITHUB_OUTPUT"
            echo "label=production" >> "$GITHUB_OUTPUT"
            echo "deploy_path=${{ vars.CPANEL_DEPLOY_PATH_PROD }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build for ${{ steps.target.outputs.label }}
        env:
          SITE_URL: ${{ steps.target.outputs.site_url }}
          LAUNCHED: ${{ steps.target.outputs.launched }}
        run: npm run build

      - name: Check SFTP credentials
        id: creds
        env:
          SFTP_HOST: ${{ secrets.CPANEL_SFTP_HOST }}
          DEPLOY_PATH: ${{ steps.target.outputs.deploy_path }}
        run: |
          if [ -n "$SFTP_HOST" ] && [ -n "$DEPLOY_PATH" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::SFTP credentials or deploy path not configured; build succeeded but deploy was skipped. Set CPANEL_SFTP_HOST/USERNAME/PASSWORD secrets and CPANEL_DEPLOY_PATH_PROD/PPE variables to enable deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to ${{ steps.target.outputs.label }} via SFTP
        if: steps.creds.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: sftp
          server: ${{ secrets.CPANEL_SFTP_HOST }}
          port: 22
          username: ${{ secrets.CPANEL_SFTP_USERNAME }}
          password: ${{ secrets.CPANEL_SFTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ steps.target.outputs.deploy_path }}/
          state-name: .ftp-deploy-sync-state.json
