name: Build and deploy

on:
  push:
    branches: [main, prod]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/prod" ]; then
            echo "artifact_branch=prod-deploy" >> "$GITHUB_OUTPUT"
            echo "site_url=https://tutelare.ai" >> "$GITHUB_OUTPUT"
            echo "launched=false" >> "$GITHUB_OUTPUT"
            echo "label=production" >> "$GITHUB_OUTPUT"
            echo "deploy_path=/home/k7sqbol3loif/tutelare.ai" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_branch=ppe-deploy" >> "$GITHUB_OUTPUT"
            echo "site_url=https://ppe.tutelare.ai" >> "$GITHUB_OUTPUT"
            echo "launched=false" >> "$GITHUB_OUTPUT"
            echo "label=PPE" >> "$GITHUB_OUTPUT"
            echo "deploy_path=/home/k7sqbol3loif/ppe.tutelare.ai" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build for ${{ steps.target.outputs.label }}
        env:
          SITE_URL: ${{ steps.target.outputs.site_url }}
          LAUNCHED: ${{ steps.target.outputs.launched }}
        run: npm run build

      - name: Generate .cpanel.yml
        env:
          DEPLOY_PATH: ${{ steps.target.outputs.deploy_path }}
          LABEL: ${{ steps.target.outputs.label }}
        run: |
          cat > dist/.cpanel.yml <<EOF
          ---
          # Generated by CI on $(date -u +%Y-%m-%dT%H:%M:%SZ) for ${LABEL}.
          # Edit .github/workflows/build-and-deploy.yml, not this file directly.
          deployment:
            tasks:
              - export DEPLOYPATH=${DEPLOY_PATH}
              - /usr/bin/rsync -av --delete --exclude='.git' --exclude='.cpanel.yml' --exclude='.htaccess' . \$DEPLOYPATH/
          EOF

      - name: Publish to ${{ steps.target.outputs.artifact_branch }} branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_BRANCH: ${{ steps.target.outputs.artifact_branch }}
        run: |
          set -euo pipefail
          cd dist
          git init -q
          git checkout -q -b "$ARTIFACT_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${{ github.sha }} to $ARTIFACT_BRANCH"
          git push --force --quiet "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "${ARTIFACT_BRANCH}:${ARTIFACT_BRANCH}"
