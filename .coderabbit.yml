# CodeRabbit configuration.
# Documentation: https://docs.coderabbit.ai/guides/configure-coderabbit
#
# CodeRabbit is installed as a GitHub App. To enable on this repo:
#   1. Visit https://coderabbit.ai and install the GitHub App on ScottThurlow/tutelare
#   2. Grant access to the repo
#   3. Future PRs will be reviewed automatically using this config

language: en-US
early_access: false
tone_instructions: |
  Match the practitioner voice of the site: substantive, direct, technically literate.
  No hype words. Surface concrete suggestions over generic praise.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - prod
  path_filters:
    - "!notes/**"
    - "!**/*.lock"
    - "!**/package-lock.json"
  path_instructions:
    - path: "src/content/writing/**"
      instructions: |
        These are essays in MDX. Focus on accuracy of cited statistics
        against the verified sources, voice consistency with the
        practitioner tone, and clarity of argument. Do NOT critique
        prose style for blog-vs-essay conventions — the firm voice is
        deliberately essayistic.
    - path: ".cpanel.yml"
      instructions: |
        This file is executed server-side on cPanel during deploys.
        Flag any task that could fail silently, anything that assumes
        a path not verified in cPanel, or anything that could be
        injected via branch name.
    - path: ".github/workflows/**"
      instructions: |
        Surface any secrets handling issues, unpinned action versions,
        or missing permission scoping.

chat:
  auto_reply: true
