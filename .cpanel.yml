---
# cPanel Git Version Control deploy manifest.
#
# When Scott clicks "Update from Remote + Deploy HEAD Commit" in cPanel,
# this runs. cwd is the cloned repo directory, which now contains a
# pre-built dist/ folder (CI commits it via deploy.yml workflow).
#
# This file is intentionally minimal: no npm, no build. The build
# happens in GitHub Actions and the result is committed to the
# source branch by CI. cPanel just rsyncs the built dist/ to the
# correct webroot.
#
# Paths below are for cPanel account k7sqbol3loif on GoDaddy.
# If actual paths differ (look in cPanel -> Domains -> Document Root),
# edit this file in a PR — do not edit on the cPanel server.

deployment:
  tasks:
    # Determine deploy target from the checked-out branch.
    - |
      BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --abbrev-ref HEAD)
      case "$BRANCH" in
        prod)
          export DEPLOYPATH=/home/k7sqbol3loif/tutelare.ai
          ;;
        main|*)
          export DEPLOYPATH=/home/k7sqbol3loif/ppe.tutelare.ai
          ;;
      esac
      echo "Deploying branch $BRANCH to $DEPLOYPATH"

    # Sync the pre-built dist/ to the webroot. Preserves .htaccess.
    - /usr/bin/rsync -av --delete --exclude='.htaccess' dist/ $DEPLOYPATH/
